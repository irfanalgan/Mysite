[build]
  command = "npm run build"
  publish = "build"

[functions]
  directory = "netlify/functions"

# /api/chat → Netlify Function
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

# React Router için fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
